<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Plataforma de Capacitação</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Painel Administrativo</h1>
    <p>Cadastro de Cursos</p>
    <button class="login-btn" onclick="window.location.href='index.html'">VER SITE</button>
</header>

<section>
    <div class="form-admin">
        <h2>Cadastrar Novo Curso</h2>
        <input type="text" id="titulo" placeholder="Título do Curso">
        <input type="text" id="imagem" placeholder="URL da Imagem (Ex: https://link-da-imagem.com/img.jpg)">
        <button class="btn-salvar" onclick="salvarCurso()">Salvar Curso</button>
    </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
